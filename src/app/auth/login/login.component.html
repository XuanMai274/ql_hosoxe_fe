<div class="login-wrapper">
  <div class="login-card">

    <!-- Logo / Icon -->
    <div class="login-header">
      <div>
        <img src="assets\public\img\logo.webp" alt="BIDV Logo" class="logo-img" width="200" height="67" />
      </div>

      <h1>HỆ THỐNG QUẢN LÝ HỒ SƠ XE</h1>
      <p>Ngân hàng TMCP Đầu tư và Phát triển Việt Nam</p>
    </div>

    <!-- Welcome Back Header -->
    <div *ngIf="isReturningUser" class="welcome-back">
      <h2>Chào mừng trở lại,</h2>
      <p class="saved-username">{{ savedUsername }}</p>
      <a href="javascript:void(0)" (click)="onSwitchAccount()" class="switch-account">Không phải bạn?</a>
    </div>

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">

      <!-- Username (Only show if not returning user) -->
      <div class="form-group" *ngIf="!isReturningUser">
        <label>Tên đăng nhập</label>
        <input type="text" formControlName="username" placeholder="Nhập tên đăng nhập" />
        <small *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.invalid">
          Tên đăng nhập không được để trống
        </small>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label>Mật khẩu</label>
        <div class="password-input-wrapper">
          <input type="password" formControlName="password" placeholder="Nhập mật khẩu" autofocus />
        </div>
        <small *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
          Mật khẩu không được để trống
        </small>
      </div>

      <!-- Button -->
      <button type="submit" class="btn-login" [disabled]="isLoading">
        <span *ngIf="!isLoading">Đăng nhập</span>
        <span *ngIf="isLoading" class="loading">
          <span class="spinner"></span>
          Đang đăng nhập...
        </span>
      </button>

    </form>

    <!-- Footer -->
    <div class="login-footer">
      © 2026 BIDV – Vehicle Profile Management System
    </div>

  </div>
</div>
